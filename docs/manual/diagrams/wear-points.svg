<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 300" font-family="Georgia, serif">
  <rect width="840" height="300" fill="#F5EFE6"/>
  <rect width="840" height="40" fill="#C9A86A"/>
  <text x="420" y="27" text-anchor="middle" font-size="19" font-weight="bold" fill="#3A2E26" letter-spacing="1.5">WHERE HONEST WEAR LIVES</text>
  <!-- chest of drawers silhouette, centered -->
  <g stroke="#3A2E26" stroke-width="1.8" fill="#C9A86A" fill-opacity="0.32">
    <rect x="350" y="74" width="160" height="170"/>
    <rect x="350" y="74" width="160" height="14" fill="#C9A86A" fill-opacity="0.5"/>
    <rect x="362" y="100" width="136" height="34" fill="none"/>
    <rect x="362" y="142" width="136" height="34" fill="none"/>
    <rect x="362" y="184" width="136" height="34" fill="none"/>
  </g>
  <g stroke="#3A2E26" stroke-width="1.6" fill="none">
    <circle cx="430" cy="117" r="5"/><circle cx="430" cy="159" r="5"/><circle cx="430" cy="201" r="5"/>
    <path d="M350 244 l-10 28 M510 244 l10 28"/>
  </g>
  <!-- wear callouts -->
  <g stroke="#9B4B3B" stroke-width="1.4" fill="none">
    <line x1="350" y1="81" x2="250" y2="70"/>
    <line x1="430" y1="117" x2="600" y2="110"/>
    <line x1="510" y1="120" x2="610" y2="160"/>
    <line x1="345" y1="270" x2="250" y2="260"/>
  </g>
  <g font-size="13" fill="#9B4B3B" font-weight="bold">
    <text x="120" y="74">Top edges</text>
    <text x="606" y="114">Pulls &amp; knobs</text>
    <text x="606" y="164">Drawer-front corners</text>
    <text x="120" y="264">Feet &amp; base</text>
  </g>
  <g font-size="12" fill="#3E6B66">
    <text x="120" y="92">handled most</text>
    <text x="606" y="132">finger wear around them</text>
    <text x="606" y="182">opened a thousand times</text>
    <text x="120" y="282">scuffs, losses, settling</text>
  </g>
  <text x="420" y="294" text-anchor="middle" font-size="11.5" fill="#3A2E26" font-style="italic">Wear should match how a piece is used. Even wear everywhere, or none at all, is suspicious.</text>
</svg>
