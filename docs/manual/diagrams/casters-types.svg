<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 240" font-family="Georgia, serif">
  <rect width="840" height="240" fill="#F5EFE6"/>
  <rect width="840" height="40" fill="#C9A86A"/>
  <text x="420" y="27" text-anchor="middle" font-size="19" font-weight="bold" fill="#3A2E26" letter-spacing="1.5">CASTERS BY PERIOD</text>
  <g stroke="#3A2E26" stroke-width="1.6" fill="none">
    <!-- leg stubs -->
    <rect x="80" y="64" width="40" height="40" fill="#C9A86A" fill-opacity="0.4"/>
    <rect x="290" y="64" width="40" height="40" fill="#C9A86A" fill-opacity="0.4"/>
    <rect x="500" y="64" width="40" height="40" fill="#C9A86A" fill-opacity="0.4"/>
    <rect x="710" y="64" width="40" height="40" fill="#C9A86A" fill-opacity="0.4"/>
    <!-- 1 porcelain wheel (white) -->
    <path d="M88 104 h24 l6 14 h-36 Z"/>
    <circle cx="100" cy="132" r="16" fill="#FBF7F0"/>
    <!-- 2 cast-iron wheel (dark) -->
    <path d="M298 104 h24 l6 14 h-36 Z"/>
    <circle cx="310" cy="132" r="16" fill="#3A2E26" fill-opacity="0.65"/><circle cx="310" cy="132" r="4" fill="#F5EFE6"/>
    <!-- 3 brass cup + leather/wood wheel -->
    <path d="M508 104 h24 v10 q-12 8 -24 0 Z" fill="#C9A86A" fill-opacity="0.6"/>
    <circle cx="520" cy="132" r="15" fill="#F0E7D4"/>
    <!-- 4 rubber / composition -->
    <path d="M718 104 h24 l6 14 h-36 Z"/>
    <circle cx="730" cy="132" r="16" fill="#2b2b2b" fill-opacity="0.8"/>
  </g>
  <g font-size="13" fill="#3A2E26" font-weight="bold" text-anchor="middle">
    <text x="100" y="176">Porcelain wheel</text><text x="310" y="176">Cast-iron wheel</text>
    <text x="520" y="176">Brass cup + wheel</text><text x="730" y="176">Rubber / composition</text>
  </g>
  <g font-size="12" fill="#3E6B66" text-anchor="middle">
    <text x="100" y="195">c. 1860 to 1900</text><text x="310" y="195">c. 1880 to 1920</text>
    <text x="520" y="195">Federal, early Victorian</text><text x="730" y="195">after 1900; often a swap</text>
  </g>
  <text x="420" y="222" text-anchor="middle" font-size="11.5" fill="#9B4B3B" font-style="italic">Distrust a single late caster as a date: it is usually a replacement.</text>
</svg>
