<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="Georgia, 'Times New Roman', serif">
  <rect width="720" height="360" fill="#F5EFE6"/>
  <text x="360" y="34" text-anchor="middle" font-size="22" fill="#3A2E26" font-weight="bold">Turned-leg and turning types</text>

  <g fill="#C9A86A" stroke="#3A2E26" stroke-width="2.5" stroke-linejoin="round">
    <!-- Barley-twist -->
    <path d="M110,80 C150,100 70,120 110,140 C150,160 70,180 110,200 C150,220 70,240 110,260 C150,280 70,300 110,300" fill="none" stroke-width="9"/>

    <!-- Ring-turned -->
    <rect x="262" y="80" width="16" height="220"/>
    <ellipse cx="270" cy="110" rx="16" ry="7"/>
    <ellipse cx="270" cy="145" rx="16" ry="7"/>
    <ellipse cx="270" cy="185" rx="16" ry="7"/>
    <ellipse cx="270" cy="225" rx="16" ry="7"/>
    <ellipse cx="270" cy="265" rx="16" ry="7"/>

    <!-- Ball / baluster -->
    <rect x="422" y="80" width="14" height="220"/>
    <circle cx="429" cy="130" r="20"/>
    <circle cx="429" cy="210" r="16"/>

    <!-- Bobbin / spool -->
    <g>
      <circle cx="590" cy="95" r="15"/>
      <circle cx="590" cy="128" r="15"/>
      <circle cx="590" cy="161" r="15"/>
      <circle cx="590" cy="194" r="15"/>
      <circle cx="590" cy="227" r="15"/>
      <circle cx="590" cy="260" r="15"/>
    </g>
  </g>

  <g text-anchor="middle" fill="#3A2E26">
    <text x="110" y="330" font-size="15" font-weight="bold">Barley-twist</text>
    <text x="110" y="349" font-size="12">spiral turning</text>
    <text x="270" y="330" font-size="15" font-weight="bold">Ring-turned</text>
    <text x="270" y="349" font-size="12">stacked rings</text>
    <text x="429" y="330" font-size="15" font-weight="bold">Ball / baluster</text>
    <text x="429" y="349" font-size="12">swelling forms</text>
    <text x="590" y="330" font-size="15" font-weight="bold">Bobbin / spool</text>
    <text x="590" y="349" font-size="12">stacked spools</text>
  </g>
</svg>
