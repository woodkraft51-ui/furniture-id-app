<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 240" font-family="Georgia, serif">
  <rect width="840" height="240" fill="#F5EFE6"/>
  <rect width="840" height="40" fill="#C9A86A"/>
  <text x="420" y="27" text-anchor="middle" font-size="19" font-weight="bold" fill="#3A2E26" letter-spacing="1.5">HINGES AND ESCUTCHEONS</text>
  <g stroke="#3A2E26" stroke-width="1.6" fill="none">
    <!-- HL hinge -->
    <path d="M90 70 v90 M90 70 h22 v20 h-22 M90 160 h22 v-20 h-22 M90 96 h40 v8 h-40" fill="#C9A86A" fill-opacity="0.4" stroke="#3A2E26"/>
    <circle cx="90" cy="90" r="2.5" fill="#3A2E26"/><circle cx="90" cy="140" r="2.5" fill="#3A2E26"/><circle cx="118" cy="100" r="2.5" fill="#3A2E26"/>
    <!-- H hinge -->
    <path d="M300 70 v90 M340 70 v90 M300 110 h40" fill="none"/>
    <rect x="292" y="70" width="16" height="90" fill="#C9A86A" fill-opacity="0.4"/><rect x="332" y="70" width="16" height="90" fill="#C9A86A" fill-opacity="0.4"/>
    <!-- butt hinge -->
    <rect x="500" y="78" width="30" height="74" fill="#C9A86A" fill-opacity="0.4"/><rect x="530" y="78" width="30" height="74" fill="#FBF7F0"/>
    <line x1="530" y1="78" x2="530" y2="152"/>
    <circle cx="530" cy="90" r="3"/><circle cx="530" cy="115" r="3"/><circle cx="530" cy="140" r="3"/>
    <!-- escutcheon (keyhole plate) -->
    <path d="M720 78 q24 -8 48 0 q8 36 0 74 q-24 8 -48 0 q-8 -36 0 -74 Z" fill="#C9A86A" fill-opacity="0.4"/>
    <circle cx="744" cy="108" r="6" fill="#3A2E26"/><path d="M744 114 l-5 18 h10 Z" fill="#3A2E26"/>
  </g>
  <g font-size="13" fill="#3A2E26" font-weight="bold" text-anchor="middle">
    <text x="105" y="186">HL hinge</text><text x="320" y="186">H hinge</text><text x="530" y="186">Butt hinge</text><text x="744" y="186">Escutcheon</text>
  </g>
  <g font-size="12" fill="#3E6B66" text-anchor="middle">
    <text x="105" y="205">early, exposed</text><text x="320" y="205">early, exposed</text><text x="530" y="205">mortised; factory when uniform</text><text x="744" y="205">follows pull chronology</text>
  </g>
  <text x="420" y="228" text-anchor="middle" font-size="11.5" fill="#9B4B3B" font-style="italic">Exposed HL and H hinges read early; hidden, identical butt hinges read factory era.</text>
</svg>
