<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Georgia, 'Times New Roman', serif">
  <rect width="900" height="380" fill="#F5EFE6"/>
  <text x="450" y="34" text-anchor="middle" font-size="22" fill="#3A2E26" font-weight="bold">Legs, and the period each one points to</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#3A2E26">The cover is replaced; the legs rarely are. Read them.</text>

  <g fill="#C9A86A" stroke="#3A2E26" stroke-width="2.5" stroke-linejoin="round">
    <!-- William & Mary: turned leg + box stretcher + bun foot -->
    <rect x="102" y="90" width="16" height="170"/>
    <ellipse cx="110" cy="120" rx="13" ry="9"/>
    <ellipse cx="110" cy="165" rx="14" ry="10"/>
    <ellipse cx="110" cy="210" rx="13" ry="9"/>
    <ellipse cx="110" cy="270" rx="16" ry="11"/>
    <line x1="118" y1="245" x2="158" y2="245" stroke-width="6"/>

    <!-- Queen Anne: cabriole + pad foot -->
    <path d="M264,90 C246,150 250,212 268,250 L284,250 C300,212 292,150 276,90 Z"/>
    <ellipse cx="276" cy="262" rx="18" ry="9"/>

    <!-- Chippendale: cabriole + ball-and-claw -->
    <path d="M424,90 C406,150 410,212 428,248 L444,248 C460,212 452,150 436,90 Z"/>
    <circle cx="436" cy="262" r="15"/>
    <line x1="424" y1="258" x2="421" y2="276" stroke-width="2"/>
    <line x1="436" y1="262" x2="436" y2="280" stroke-width="2"/>
    <line x1="448" y1="258" x2="451" y2="276" stroke-width="2"/>

    <!-- Federal: square tapered -->
    <polygon points="582,90 600,90 594,272 588,272"/>

    <!-- Reeded -->
    <polygon points="742,90 760,90 754,272 748,272"/>
    <line x1="748" y1="98" x2="750" y2="266" stroke-width="1.5"/>
    <line x1="751" y1="98" x2="752" y2="266" stroke-width="1.5"/>
    <line x1="754" y1="98" x2="751" y2="266" stroke-width="1.5"/>
  </g>

  <g text-anchor="middle" fill="#3A2E26">
    <text x="120" y="312" font-size="15" font-weight="bold">William &amp; Mary</text>
    <text x="120" y="332" font-size="12">turned legs, box stretcher</text>
    <text x="120" y="350" font-size="12">c. 1690 to 1730</text>

    <text x="276" y="312" font-size="15" font-weight="bold">Queen Anne</text>
    <text x="276" y="332" font-size="12">cabriole leg, pad foot</text>
    <text x="276" y="350" font-size="12">c. 1720 to 1760</text>

    <text x="436" y="312" font-size="15" font-weight="bold">Chippendale</text>
    <text x="436" y="332" font-size="12">cabriole, ball-and-claw</text>
    <text x="436" y="350" font-size="12">mid 1700s</text>

    <text x="591" y="312" font-size="15" font-weight="bold">Federal</text>
    <text x="591" y="332" font-size="12">square tapered leg</text>
    <text x="591" y="350" font-size="12">c. 1790 to 1820</text>

    <text x="751" y="312" font-size="15" font-weight="bold">Reeded</text>
    <text x="751" y="332" font-size="12">reeded leg</text>
    <text x="751" y="350" font-size="12">Federal and later</text>
  </g>
</svg>
