  <g font-size="14" fill="#3A2E26" font-weight="bold" text-anchor="middle">
    <text x="114" y="252">Straight grain</text>
    <text x="318" y="252">Cathedral (flat-sawn)</text>
    <text x="522" y="252">Quartersawn ray fleck</text>
    <text x="726" y="252">Burl</text>
  </g>
  <g font-size="12.5" fill="#3E6B66" text-anchor="middle">
    <text x="114" y="272">quartered boards</text>
    <text x="318" y="272">plain-sawn faces</text>
    <text x="522" y="272">tiger flecks: Golden Oak</text>
    <text x="726" y="272">prized figure, veneer</text>
  </g>
