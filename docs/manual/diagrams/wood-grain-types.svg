    <path d="M236 228 q82 -150 164 0"/><path d="M252 228 q66 -120 132 0"/><path d="M268 228 q50 -92 100 0"/><path d="M284 228 q34 -64 68 0"/><path d="M300 228 q18 -36 36 0"/>
  </g>
