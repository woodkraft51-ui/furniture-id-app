  <g stroke="#3A2E26" stroke-width="1.1" fill="none">
    <path d="M456 84 v144"/><path d="M480 84 v144"/><path d="M504 84 v144"/><path d="M528 84 v144"/><path d="M552 84 v144"/><path d="M576 84 v144"/><path d="M600 84 v144"/>
  </g>
  <g stroke="#9B4B3B" stroke-width="2.4">
    <line x1="462" y1="108" x2="478" y2="112"/><line x1="520" y1="128" x2="540" y2="124"/><line x1="486" y1="160" x2="506" y2="164"/><line x1="560" y1="150" x2="582" y2="146"/><line x1="500" y1="196" x2="520" y2="192"/><line x1="566" y1="200" x2="588" y2="204"/><line x1="470" y1="184" x2="488" y2="188"/>
  </g>
  <!-- burl: swirls -->
  <g stroke="#3A2E26" stroke-width="1.1" fill="none">
    <ellipse cx="690" cy="120" rx="26" ry="18"/><ellipse cx="690" cy="120" rx="16" ry="10"/>
    <ellipse cx="752" cy="160" rx="30" ry="20"/><ellipse cx="752" cy="160" rx="19" ry="12"/><ellipse cx="752" cy="160" rx="9" ry="6"/>
    <ellipse cx="688" cy="190" rx="22" ry="14"/><ellipse cx="688" cy="190" rx="12" ry="7"/>
    <ellipse cx="730" cy="104" rx="14" ry="9"/>
