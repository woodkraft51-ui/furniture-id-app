<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 300" font-family="Georgia, serif">
  <rect width="840" height="300" fill="#F5EFE6"/>
  <rect width="840" height="40" fill="#C9A86A"/>
  <text x="420" y="27" text-anchor="middle" font-size="19" font-weight="bold" fill="#3A2E26" letter-spacing="1.5">READING THE GRAIN</text>
  <g>
    <rect x="24"  y="78" width="180" height="150" fill="#FBF7F0" stroke="#3A2E26" stroke-width="1.3"/>
    <rect x="228" y="78" width="180" height="150" fill="#FBF7F0" stroke="#3A2E26" stroke-width="1.3"/>
    <rect x="432" y="78" width="180" height="150" fill="#FBF7F0" stroke="#3A2E26" stroke-width="1.3"/>
    <rect x="636" y="78" width="180" height="150" fill="#FBF7F0" stroke="#3A2E26" stroke-width="1.3"/>
  </g>
  <!-- straight grain -->
  <g stroke="#3A2E26" stroke-width="1.2" fill="none">
    <path d="M48 84 q6 72 0 144"/><path d="M72 84 q-6 72 0 144"/><path d="M96 84 q6 72 0 144"/><path d="M120 84 q-5 72 0 144"/><path d="M144 84 q6 72 0 144"/><path d="M168 84 q-6 72 0 144"/><path d="M180 84 q4 72 0 144"/>
  </g>
  <!-- cathedral / flat-sawn arches -->
