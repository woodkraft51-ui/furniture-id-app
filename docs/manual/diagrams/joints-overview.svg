<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 230" font-family="Georgia, serif">
  <rect width="840" height="230" fill="#F5EFE6"/>
  <rect width="840" height="40" fill="#C9A86A"/>
  <text x="420" y="27" text-anchor="middle" font-size="19" font-weight="bold" fill="#3A2E26" letter-spacing="1.5">THE OTHER JOINTS YOU WILL MEET</text>
  <g stroke="#3A2E26" stroke-width="1.6" fill="#C9A86A" fill-opacity="0.32">
    <!-- 1 dowel joint -->
    <rect x="40" y="78" width="60" height="74"/><rect x="110" y="78" width="60" height="74"/>
  </g>
  <g fill="#3A2E26"><circle cx="105" cy="98" r="4"/><circle cx="105" cy="132" r="4"/></g>
  <g stroke="#3A2E26" stroke-width="1.6" fill="#C9A86A" fill-opacity="0.32">
    <!-- 2 rabbet / dado: grooved member holding a panel -->
    <path d="M250 78 h70 v74 h-70 v-22 h44 v-30 h-44 Z"/>
    <rect x="294" y="100" width="46" height="30" fill="#FBF7F0"/>
    <!-- 3 rule joint board -->
    <rect x="468" y="78" width="84" height="74"/>
    <!-- 4 knock-down bolt -->
    <rect x="660" y="78" width="50" height="74"/><rect x="710" y="78" width="50" height="74" fill="#FBF7F0"/>
  </g>
  <path d="M510 78 q-15 18 0 37 q15 19 0 37" fill="none" stroke="#3A2E26" stroke-width="1.6"/>
  <g stroke="#3A2E26" stroke-width="2" fill="none">
    <line x1="650" y1="115" x2="770" y2="115"/>
  </g>
  <g fill="#3A2E26"><rect x="644" y="108" width="10" height="14"/><circle cx="772" cy="115" r="7" fill="none" stroke="#3A2E26" stroke-width="2"/></g>
  <g font-size="13" fill="#3A2E26" font-weight="bold" text-anchor="middle">
    <text x="105" y="180">Dowel</text><text x="315" y="180">Rabbet / dado</text><text x="525" y="180">Rule joint</text><text x="710" y="180">Knock-down bolt</text>
  </g>
  <g font-size="11.5" fill="#3E6B66" text-anchor="middle">
    <text x="105" y="198">later factory work</text><text x="315" y="198">case backs, shelves</text><text x="525" y="198">proper drop-leaf</text><text x="710" y="198">wardrobes, beds: original</text>
  </g>
  <text x="420" y="220" text-anchor="middle" font-size="11.5" fill="#9B4B3B" font-style="italic">Pinned mortise-and-tenon leans early; all-dowel and biscuit joints lean late.</text>
</svg>
