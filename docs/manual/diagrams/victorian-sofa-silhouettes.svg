<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 320" font-family="Georgia, 'Times New Roman', serif">
  <rect width="920" height="320" fill="#F5EFE6"/>
  <text x="460" y="32" text-anchor="middle" font-size="22" fill="#3A2E26" font-weight="bold">Victorian sofa silhouettes</text>

  <g fill="#C9A86A" stroke="#3A2E26" stroke-width="2.5" stroke-linejoin="round">
    <!-- Grecian / recamier: one raised scrolled end -->
    <g transform="translate(40,70)">
      <path d="M0,120 L0,70 Q0,40 40,40 Q70,40 70,75 L70,95 L170,95 L170,120 Z"/>
      <circle cx="22" cy="62" r="10" fill="#F5EFE6"/>
      <line x1="20" y1="120" x2="20" y2="150"/>
      <line x1="160" y1="120" x2="160" y2="150"/>
    </g>
    <!-- Rococo Revival: serpentine carved crest, cabriole -->
    <g transform="translate(250,70)">
      <path d="M0,120 L0,95 Q10,60 45,70 Q90,30 135,70 Q170,60 180,95 L180,120 Z"/>
      <line x1="0" y1="120" x2="0" y2="95"/>
      <line x1="180" y1="120" x2="180" y2="95"/>
      <path d="M14,120 C8,140 8,150 18,156"/>
      <path d="M166,120 C172,140 172,150 162,156"/>
    </g>
    <!-- Renaissance Revival: architectural crest with central pediment -->
    <g transform="translate(490,70)">
      <path d="M0,120 L0,80 L60,80 L75,52 L105,52 L120,80 L180,80 L180,120 Z"/>
      <line x1="20" y1="120" x2="20" y2="152"/>
      <line x1="160" y1="120" x2="160" y2="152"/>
    </g>
    <!-- Eastlake: rectilinear straight crest -->
    <g transform="translate(720,70)">
      <rect x="0" y="76" width="180" height="44"/>
      <line x1="0" y1="86" x2="180" y2="86"/>
      <line x1="18" y1="120" x2="18" y2="152"/>
      <line x1="162" y1="120" x2="162" y2="152"/>
    </g>
  </g>

  <g text-anchor="middle" fill="#3A2E26">
    <text x="125" y="250" font-size="15" font-weight="bold">Grecian / recamier</text>
    <text x="125" y="269" font-size="12">one raised scrolled end, 1840s</text>
    <text x="340" y="250" font-size="15" font-weight="bold">Rococo Revival</text>
    <text x="340" y="269" font-size="12">serpentine carved crest, 1850-65</text>
    <text x="580" y="250" font-size="15" font-weight="bold">Renaissance Revival</text>
    <text x="580" y="269" font-size="12">central pediment crest, 1865-85</text>
    <text x="810" y="250" font-size="15" font-weight="bold">Eastlake</text>
    <text x="810" y="269" font-size="12">straight rectilinear crest, 1880s</text>
  </g>
</svg>
