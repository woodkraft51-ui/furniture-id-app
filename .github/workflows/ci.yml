name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # package-lock.json is intentionally gitignored (see .gitignore), so there is
      # no lockfile to drive `npm ci` or setup-node's npm cache — use `npm install`.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Test (unit fixes + scan-corpus fidelity gate)
        run: npm test
